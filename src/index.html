<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      overflow: hidden;
      margin: 0px;
    }

    main {
      height: 80vh;
    }
  </style>
</head>

<body>
  <main id="earth-viewer">
  </main>
  <button onclick="launch()">Launch</button>
  <button onclick="dispose()">Dispose</button>
  <script defer app-callback="start">
    let globalApp;
    async function start(app) {
      globalApp = app;
    }
    async function launch() {
      globalApp.viewer.addTasks([
          async () => {
              await globalApp.loadIbl('./assets/room_irradiance_uastc.ktx2', './assets/room_radiance_uastc.ktx2');
            }
        ]);
      await globalApp.viewer.launch();
      await globalApp.start();
    }
    function dispose() {
      globalApp.dispose();
      globalApp = null;
    }

  </script>
  <script defer type="module" src="./main.ts"></script>
</body>

</html>
